L.circle([25.5,53.0], { radius: 500000, color: '#ef4444', weight: 1, fillColor: '#ef4444', fillOpacity: 0.04, dashArray: '8,6' }).bindPopup(popup('Gulf Conflict Zone', 'CONFLICT ZONE', '#ef4444', 'Iranian ballistic missiles and drones targeting UAE, Saudi Arabia, Kuwait. Iraqi militia attacks. Extreme war risk insurance zone.')).addTo(layers['attack-zones']);
var layerStates = {};
Object.keys(layers).forEach(function(k){ layerStates[k] = true; });
function toggleLayer(name) {
  if (layerStates[name]) { map.removeLayer(layers[name]); layerStates[name] = false; document.getElementById('btn-'+name).classList.remove('active'); }
  else { map.addLayer(layers[name]); layerStates[name] = true; document.getElementById('btn-'+name).classList.add('active'); }
}
