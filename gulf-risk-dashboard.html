<style>

}

hormuzZone.bindTooltip('Hormuz Attack Zone - Active IRGC Operations'); layers.zones.addLayer(hormuzZone);
var gulfZone = L.polygon([[30.0,48.0],[30.0,57.0],[22.5,60.0],[20.0,57.0],[22.0,48.0],[26.0,46.0]], { color: '#ef4444', fillColor: '#ef4444', fillOpacity: 0.04, weight: 1, dashArray: '4,4' });
gulfZone.bindTooltip('Gulf Active Conflict Zone'); layers.zones.addLayer(gulfZone);
var layerStates = { us: true, oil: true, ports: true, iran: true, choke: true, lanes: true, pipes: true, zones: true };
function toggleLayer(key) {
  layerStates[key] = !layerStates[key];
  var tog = document.getElementById('tog-' + key);
  var btn = document.getElementById('btn-' + key);
  if (layerStates[key]) { layers[key].addTo(map); tog.textContent = 'ON'; btn.classList.add('active'); }
  else { map.removeLayer(layers[key]); tog.textContent = 'OFF'; btn.classList.remove('active'); }
}
L.control.scale({ imperial: false, metric: true }).addTo(map);
</script>
